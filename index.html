}

  :root{
    --ground:#0D1220; --surface:#141C2C; --surface-2:#111828;
    --ink:#CBD9F2; --text:#E6ECF7; --muted:#8C9AB4; --faint:#66748C;
    --line:#26314A; --line-soft:#1E2739;
    --kanji:#6BA6F0; --vocab:#9AA0F5; --star:#6BA6F0;
    --known:#3FCB92; --known-bg:#14322A;
    --focus:#6BA6F0;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 28px -14px rgba(0,0,0,.7);
  }
}
:root[data-theme="dark"]{
  --ground:#0D1220; --surface:#141C2C; --surface-2:#111828;
  --ink:#CBD9F2; --text:#E6ECF7; --muted:#8C9AB4; --faint:#66748C;
  --line:#26314A; --line-soft:#1E2739;
  --kanji:#6BA6F0; --vocab:#9AA0F5; --star:#6BA6F0;
  --known:#3FCB92; --known-bg:#14322A; --focus:#6BA6F0;
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 28px -14px rgba(0,0,0,.7);
}
:root[data-theme="light"]{
  --ground:#F6F8FC; --surface:#FFFFFF; --surface-2:#FBFCFE;
  --ink:#16305C; --text:#1A2233; --muted:#68758C; --faint:#96A1B5;
  --line:#E3E7EE; --line-soft:#EEF2F8;
  --kanji:#0060C0; --vocab:#4550C8; --star:#0060C0;
  --known:#1E9E6A; --known-bg:#E8F6F0; --focus:#0060C0;
  --shadow:0 1px 2px rgba(22,48,92,.06), 0 8px 24px -12px rgba(22,48,92,.18);
}
*{box-sizing:border-box}
body{
  margin:0; background:var(--ground); color:var(--text);
  font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
  font-size:15px; line-height:1.5; -webkit-text-size-adjust:100%;
}
.jp{font-family:"Pretendard JP","Yu Gothic","Hiragino Kaku Gothic ProN","Meiryo","Noto Sans JP",sans-serif;}
.wrap{max-width:940px;margin:0 auto;padding:0 16px}

/* ── 헤더 ── */
header{background:var(--surface);border-bottom:1px solid var(--line)}
.head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;padding:22px 0 16px}
.brand{font-size:19px;font-weight:800;color:var(--ink);letter-spacing:-.01em}
.brand em{font-style:normal;color:var(--kanji)}
.sub{font-size:12.5px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-variant-numeric:tabular-nums}
.themebtn{margin-left:auto;background:none;border:1px solid var(--line);color:var(--muted);
  border-radius:999px;padding:6px 12px;font:inherit;font-size:12px;cursor:pointer}
.themebtn:hover{border-color:var(--kanji);color:var(--kanji)}

/* ── 툴바 ── */
.toolbar{position:sticky;top:0;z-index:30;background:var(--surface);border-bottom:1px solid var(--line);
  box-shadow:0 1px 0 rgba(0,0,0,0)}
.toolbar.stuck{box-shadow:var(--shadow)}
.searchrow{display:flex;gap:8px;align-items:center;padding:12px 0 10px}
.search{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface-2);
  border:1.5px solid var(--line);border-radius:10px;padding:0 12px;transition:border-color .15s}
.search:focus-within{border-color:var(--focus)}
.search svg{flex:none;color:var(--faint)}
.search input{flex:1;border:0;background:none;color:var(--text);font:inherit;font-size:15px;padding:11px 0;outline:none}
.search button{border:0;background:none;color:var(--faint);cursor:pointer;font-size:16px;padding:4px 2px;line-height:1}
.search button:hover{color:var(--text)}

.chips{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:10px}
.chip{border:1px solid var(--line);background:var(--surface);color:var(--muted);
  border-radius:999px;padding:6px 12px;font:inherit;font-size:12.5px;cursor:pointer;
  transition:background .12s,color .12s,border-color .12s;white-space:nowrap}
.chip:hover{border-color:var(--faint);color:var(--text)}
.chip[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
.chip.k[aria-pressed="true"]{background:var(--kanji);border-color:var(--kanji)}
.chip.v[aria-pressed="true"]{background:var(--vocab);border-color:var(--vocab)}
.chip:focus-visible,.themebtn:focus-visible,.dayb:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
.sep{width:1px;align-self:stretch;background:var(--line);margin:2px 5px}

.days{display:flex;gap:5px;overflow-x:auto;padding:0 0 12px;scrollbar-width:thin}
.dayb{flex:none;border:1px solid var(--line);background:var(--surface);color:var(--muted);
  border-radius:8px;min-width:38px;padding:6px 8px;font:inherit;font-size:12.5px;cursor:pointer;
  font-variant-numeric:tabular-nums}
.dayb[aria-pressed="true"]{color:#fff}
.dayb.k[aria-pressed="true"]{background:var(--kanji);border-color:var(--kanji)}
.dayb.v[aria-pressed="true"]{background:var(--vocab);border-color:var(--vocab)}
.dayb:hover{border-color:var(--faint)}

.status{display:flex;gap:14px;align-items:center;padding:0 0 12px;font-size:12.5px;color:var(--muted);
  font-variant-numeric:tabular-nums}
.status b{color:var(--text);font-weight:700}
.bar{flex:1;height:5px;background:var(--line-soft);border-radius:99px;overflow:hidden;max-width:220px}
.bar i{display:block;height:100%;background:var(--known);width:0;transition:width .3s}
@media (prefers-reduced-motion:reduce){.bar i{transition:none}}

/* ── 목록 ── */
main{padding:18px 0 80px}
.group{margin-bottom:26px}
.ghead{display:flex;align-items:center;gap:10px;margin:0 0 10px;padding-bottom:8px;border-bottom:2px solid var(--line)}
.gnum{font-size:12px;font-weight:800;color:#fff;background:var(--kanji);border-radius:6px;padding:3px 8px;
  font-variant-numeric:tabular-nums;letter-spacing:.02em}
.gnum.v{background:var(--vocab)}
.gtitle{font-size:15px;font-weight:700;color:var(--ink)}
.gcount{margin-left:auto;font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums}

ul{list-style:none;margin:0;padding:0;display:grid;gap:6px}
li.row{background:var(--surface);border:1px solid var(--line);border-radius:10px;
  display:grid;grid-template-columns:24px minmax(0,7.5rem) minmax(0,6.5rem) minmax(0,1fr) 3.2rem;
  gap:14px;align-items:center;
  padding:11px 13px;cursor:pointer;transition:border-color .12s,background .12s;
  content-visibility:auto;contain-intrinsic-size:0 46px}
li.row:hover{border-color:var(--faint)}
li.row.known{background:var(--known-bg);border-color:transparent}
li.row.open{border-color:var(--focus)}
.chk{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);background:var(--surface-2);
  display:grid;place-items:center;cursor:pointer;padding:0;color:transparent;font-size:13px;line-height:1}
li.row.known .chk{background:var(--known);border-color:var(--known);color:#fff}
.chk:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
.w{font-size:19px;font-weight:600;color:var(--text);word-break:break-word;line-height:1.35}
.rd{font-size:13.5px;color:var(--muted);word-break:break-word;line-height:1.35;
  border-left:1px solid var(--line-soft);padding-left:14px;margin-left:-14px}
.m{font-size:14.5px;color:var(--text);word-break:break-word;
  border-left:1px solid var(--line-soft);padding-left:14px;margin-left:-14px}
.st{font-size:11px;color:var(--star);letter-spacing:-1px;white-space:nowrap;text-align:right}
.hide-m .m,.hide-w .w,.hide-r .rd{filter:blur(6px);opacity:.5;transition:filter .12s,opacity .12s}
.hide-m li.row.open .m,.hide-w li.row.open .w,.hide-r li.row.open .rd,
.hide-m .m:hover,.hide-w .w:hover,.hide-r .rd:hover{filter:none;opacity:1}
.ex{grid-column:1/-1;border-top:1px dashed var(--line);margin-top:2px;padding-top:9px;display:none}
li.row.open .ex{display:block}
.exj{font-size:15.5px;color:var(--text);margin-bottom:3px}
.exj ruby rt{font-size:.45em;color:var(--muted)}
.exk{font-size:13px;color:var(--muted)}
.noruby ruby rt{display:none}

.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px}
.top{position:fixed;right:18px;bottom:18px;width:42px;height:42px;border-radius:50%;
  border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;
  box-shadow:var(--shadow);display:none;font-size:16px}
.top.show{display:block}
footer{border-top:1px solid var(--line);color:var(--faint);font-size:12px;padding:16px 0 30px;text-align:center}

@media (max-width:720px){

  .w{font-size:18px;grid-column:2}
  .rd{grid-column:2;border-left:0;padding-left:0;margin-left:0;font-size:12.5px}
  .m{grid-column:2/4;border-left:0;padding-left:0;margin-left:0;font-size:14px;color:var(--muted)}
  .st{grid-row:1;grid-column:3}
}

수준, 레벨","s":2,"j":"日本語[にほんご]のレベルが上[あ]がりました。","k":"일본어 실력이 향상되었습니다."},{"i":1780,"d":25,"p":1,"w":"レンタル","r":"レンタル","m":"대여, 렌털","s":2,"j":"自転車[じてんしゃ]をレンタルしました。","k":"자전거를 빌렸습니다."},{"i":1781,"d":25,"p":1,"w":"ロープ","r":"ロープ","m":"밧줄, 로프","s":0,"j":"ロープで荷物[にもつ]をしばりました。","k":"로프로 짐을 묶었습니다."},{"i":1782,"d":25,"p":1,"w":"ロケット","r":"ロケット","m":"로켓","s":0,"j":"ロケットが宇宙[うちゅう]へ飛[と]びました。","k":"로켓이 우주로 날아갔습니다."},{"i":1783,"d":25,"p":1,"w":"ロッカー","r":"ロッカー","m":"사물함, 로커","s":3,"j":"荷物[にもつ]をロッカーに入[い]れました。","k":"짐을 사물함에 넣었습니다."},{"i":1784,"d":25,"p":1,"w":"ロビー","r":"ロビー","m":"로비","s":1,"j":"ホテルのロビーで待[ま]っています。","k":"호텔 로비에서 기다리고 있습니다."}]}</script>
<script>
(function(){
"use strict";
var D = JSON.parse(document.getElementById('data').textContent);
var WORDS = D.w, META = D.m, LESSONS = META.lessons;
var KEY = 'n3voca.known.v1', THEME='n3voca.theme';

var known = {};
try { known = JSON.parse(localStorage.getItem(KEY) || '{}') || {}; } catch(e){ known = {}; }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(known)); }catch(e){} }

/* 후리가나 표기 '合図[あいず]' → <ruby> */
function ruby(s){
  if(!s) return '';
  var out='', re=/([^\[]*)\[([^\]]*)\]/g, m, last=0;
  while((m=re.exec(s))!==null){
    var pre=m[1], rt=m[2];
    var base=(pre.match(/[一-鿿々々]+$/)||[''])[0];
    out += esc(pre.slice(0, pre.length-base.length));
    out += '<ruby>'+esc(base)+'<rt>'+esc(rt)+'</rt></ruby>';
    last = re.lastIndex;
  }
  out += esc(s.slice(last));
  return out;
}
function esc(t){ return (t||'').replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
function plain(s){ return (s||'').replace(/\[[^\]]*\]/g,''); }

/* 상태 */
var state = { q:'', star:false, onlyNew:false, day:null };
var el = {
  list:document.getElementById('list'), q:document.getElementById('q'),
  days:document.getElementById('days'), shown:document.getElementById('shown'),
  known:document.getElementById('known'), prog:document.getElementById('prog'),
  hcount:document.getElementById('hcount')
};
el.hcount.textContent = '25 DAYS · ' + WORDS.length.toLocaleString() + ' WORDS';

/* DAY 버튼 */
var days = [];
WORDS.forEach(function(w){ if(days.indexOf(w.d)<0) days.push(w.d); });
days.sort(function(a,b){ return a-b; });
var allBtn = document.createElement('button');
allBtn.className='dayb'; allBtn.type='button'; allBtn.textContent='전체';
allBtn.setAttribute('aria-pressed','true'); allBtn.dataset.day='';
el.days.appendChild(allBtn);
days.forEach(function(d){
  var b=document.createElement('button');
  b.className='dayb '+(d<=7?'k':'v'); b.type='button';
  b.textContent=d; b.title='DAY '+d+' '+(LESSONS[d]||'');
  b.setAttribute('aria-pressed','false'); b.dataset.day=d;
  el.days.appendChild(b);
});
el.days.addEventListener('click', function(e){
  var b=e.target.closest('.dayb'); if(!b) return;
  state.day = b.dataset.day ? +b.dataset.day : null;
  [].forEach.call(el.days.children, function(x){
    x.setAttribute('aria-pressed', String(x===b));
  });
  render();
});

/* 필터 토글 */
function toggle(id, fn){
  var b=document.getElementById(id);
  b.addEventListener('click', function(){
    var on = b.getAttribute('aria-pressed')!=='true';
    b.setAttribute('aria-pressed', String(on));
    fn(on, b); render();
  });
  return b;
}
toggle('hm', function(on){ el.list.classList.toggle('hide-m', on); });
toggle('hr', function(on){ el.list.classList.toggle('hide-r', on); });
toggle('hw', function(on){ el.list.classList.toggle('hide-w', on); });
toggle('fstar', function(on){ state.star=on; });
toggle('fnew', function(on){ state.onlyNew=on; });

el.q.addEventListener('input', function(){ state.q=el.q.value.trim().toLowerCase(); render(); });
document.getElementById('clear').addEventListener('click', function(){
  el.q.value=''; state.q=''; render(); el.q.focus();
});
document.getElementById('reset').addEventListener('click', function(){
  if(!confirm('외운 단어 기록을 모두 지울까요?')) return;
  known={}; save(); render();
});

/* 필터링 */
function match(w){
  if(state.day!==null && w.d!==state.day) return false;
  if(state.star && w.s<3) return false;
  if(state.onlyNew && known[w.i]) return false;
  if(state.q){
    var q=state.q;
    if((plain(w.w)+' '+w.r+' '+w.m+' '+plain(w.j)+' '+w.k).toLowerCase().indexOf(q)<0) return false;
  }
  return true;
}

function render(){
  var rows = WORDS.filter(match);
  el.shown.textContent = rows.length.toLocaleString();
  var kn = 0; for(var k in known){ if(known[k]) kn++; }
  el.known.textContent = kn.toLocaleString();
  el.prog.style.width = (WORDS.length? (kn/WORDS.length*100):0).toFixed(1)+'%';

  if(!rows.length){
    el.list.innerHTML = '<p class="empty">조건에 맞는 단어가 없습니다.</p>';
    return;
  }
  var html=[], curDay=null;
  rows.forEach(function(w){
    if(w.d!==curDay){
      if(curDay!==null) html.push('</ul></section>');
      curDay=w.d;
      var cnt = rows.filter(function(x){ return x.d===curDay; }).length;
      html.push('<section class="group"><div class="ghead">'+
        '<span class="gnum'+(w.d>7?' v':'')+'">DAY '+(w.d<10?'0':'')+w.d+'</span>'+
        '<span class="gtitle">'+esc(LESSONS[w.d]||'')+'</span>'+
        '<span class="gcount">'+cnt+'단어</span></div><ul>');
    }
    var disp = plain(w.w);                       /* 표기(한자) */
    var yomi = (w.r && w.r !== disp) ? w.r : ''; /* 요미가나 — 가나 단어는 중복이라 생략 */
    html.push(
      '<li class="row'+(known[w.i]?' known':'')+'" data-id="'+w.i+'">'+
        '<button class="chk" type="button" aria-label="외움 표시" aria-pressed="'+(known[w.i]?'true':'false')+'">✓</button>'+
        '<span class="w jp">'+esc(disp)+'</span>'+
        '<span class="rd jp">'+esc(yomi)+'</span>'+
        '<span class="m">'+esc(w.m)+'</span>'+
        '<span class="st">'+(w.s?'★'.repeat(w.s):'')+'</span>'+
        (w.j? '<div class="ex"><div class="exj jp">'+ruby(w.j)+'</div><div class="exk">'+esc(w.k)+'</div></div>':'')+
      '</li>');
  });
  html.push('</ul></section>');
  el.list.innerHTML = html.join('');
}

el.list.addEventListener('click', function(e){
  var row = e.target.closest('.row'); if(!row) return;
  var id = row.dataset.id;
  if(e.target.closest('.chk')){
    known[id] = !known[id];
    if(!known[id]) delete known[id];
    save(); row.classList.toggle('known', !!known[id]);
    row.querySelector('.chk').setAttribute('aria-pressed', known[id]?'true':'false');
    var kn=0; for(var k in known){ if(known[k]) kn++; }
    el.known.textContent=kn.toLocaleString();
    el.prog.style.width=(kn/WORDS.length*100).toFixed(1)+'%';
    if(state.onlyNew && known[id]) render();
    return;
  }
  row.classList.toggle('open');
});

/* 테마 */
var tb=document.getElementById('theme');
var saved = null; try{ saved = localStorage.getItem(THEME); }catch(e){}
if(saved) document.documentElement.setAttribute('data-theme', saved);
tb.addEventListener('click', function(){
  var cur = document.documentElement.getAttribute('data-theme');
  if(!cur) cur = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark':'light';
  var next = cur==='dark' ? 'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  try{ localStorage.setItem(THEME, next); }catch(e){}
  render();   /* 일부 브라우저의 스타일 캐싱 대비: 목록을 다시 그려 테마를 확실히 반영 */
});

/* 스크롤 UI */
var tbar=document.getElementById('toolbar'), topb=document.getElementById('top');
addEventListener('scroll', function(){
  tbar.classList.toggle('stuck', tbar.getBoundingClientRect().top<=0);
  topb.classList.toggle('show', scrollY>600);
}, {passive:true});
topb.addEventListener('click', function(){ scrollTo({top:0, behavior:'smooth'}); });
addEventListener('keydown', function(e){
  if(e.key==='/' && document.activeElement!==el.q){ e.preventDefault(); el.q.focus(); }
});

render();
})();
</script>
